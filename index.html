<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Website → Figma ULTRA</title>

<style>

body{
font-family:Inter,Arial;
background:#020617;
color:white;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

input{
width:70%;
padding:12px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin-left:10px;
}

pre{
margin-top:30px;
background:#020617;
padding:20px;
border-radius:10px;
max-height:500px;
overflow:auto;
}

</style>

</head>

<body>

<div class="container">

<h1>Website → Figma ULTRA</h1>

<input id="url" placeholder="https://example.com">

<button onclick="convert()">Convert</button>

<button onclick="download()" id="downloadBtn" style="display:none">
Download Figma JSON
</button>

<pre id="result"></pre>

</div>

<script>

let figmaFile=null

async function fetchHTML(url){

const proxy="https://api.allorigins.win/raw?url="+encodeURIComponent(url)

const r=await fetch(proxy)

return await r.text()

}

function getStyle(el){

const s=window.getComputedStyle(el)

return{

display:s.display,
flexDirection:s.flexDirection,
justifyContent:s.justifyContent,
alignItems:s.alignItems,
width:parseFloat(s.width),
height:parseFloat(s.height),
background:s.backgroundColor,
color:s.color,
fontSize:parseFloat(s.fontSize)

}

}

function textNode(text,style){

return{

type:"TEXT",

characters:text,

style:{
fontSize:style.fontSize||16,
fills:[
{
type:"SOLID",
color:style.color
}
]
}

}

}

function imageNode(src,w,h){

return{

type:"RECTANGLE",

fills:[
{
type:"IMAGE",
src:src
}
],

size:{
width:w||200,
height:h||150
}

}

}

function frameNode(children,style){

let layout="VERTICAL"

if(style.display==="flex"){

layout=style.flexDirection==="row"
?"HORIZONTAL"
:"VERTICAL"

}

return{

type:"FRAME",

layoutMode:layout,

primaryAxisSizingMode:"AUTO",

counterAxisSizingMode:"AUTO",

fills:[
{
type:"SOLID",
color:style.background
}
],

children:children

}

}

function elementToNode(el){

const tag=el.tagName

const style=getStyle(el)

if(tag==="IMG"){

return imageNode(
el.src,
style.width,
style.height
)

}

if(
tag==="P"||
tag==="SPAN"||
tag==="H1"||
tag==="H2"||
tag==="H3"||
tag==="A"||
tag==="BUTTON"
){

const text=el.innerText.trim()

if(text.length){

return textNode(text,style)

}

}

const children=[]

for(let child of el.children){

const node=elementToNode(child)

if(node) children.push(node)

}

return frameNode(children,style)

}

function convertDOM(doc){

const nodes=[]

for(let el of doc.body.children){

const node=elementToNode(el)

if(node) nodes.push(node)

}

return{

name:"Website Import",

document:{

type:"DOCUMENT",

children:[

{

type:"CANVAS",

name:"Page",

children:[

{

type:"FRAME",

name:"Website",

layoutMode:"VERTICAL",

children:nodes

}

]

}

]

}

}

}

async function convert(){

const url=document.getElementById("url").value

document.getElementById("result").textContent="Scanning website..."

const html=await fetchHTML(url)

const parser=new DOMParser()

const doc=parser.parseFromString(html,"text/html")

figmaFile=convertDOM(doc)

document.getElementById("result").textContent=
JSON.stringify(figmaFile,null,2)

document.getElementById("downloadBtn").style.display="inline-block"

}

function download(){

const blob=new Blob(
[JSON.stringify(figmaFile,null,2)],
{type:"application/json"}
)

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="figma.json"

a.click()

}

</script>

</body>

</html>
